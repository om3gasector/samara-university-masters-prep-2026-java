<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Повторение</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="toolbar">
        <label class="field-narrow">Навык
          <select id="skill"></select>
        </label>
        <label class="field-narrow">Подкаталог
          <select id="subfolder"></select>
        </label>
        <label class="field-grow">Фильтр по пути / заголовку
          <input type="search" id="filter" placeholder="например: 5." />
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="onlyMain" />
          Только основные вопросы
        </label>
        <button type="button" id="reload">Обновить колоду</button>
      </div>
    </header>

    <main class="main" id="main">
      <p class="loading hidden" id="loading">Загрузка…</p>
      <p class="error hidden" id="error"></p>
      <section class="card hidden" id="card">
        <p class="meta" id="meta"></p>
        <div class="front-wrap">
          <p class="label">Вопрос</p>
          <div class="front" id="front"></div>
        </div>
        <button type="button" class="reveal" id="reveal">Показать ответ</button>
        <div class="back-wrap hidden" id="backWrap">
          <p class="label">Ответ</p>
          <div class="back markdown-body" id="back"></div>
        </div>
        <div class="actions hidden" id="actions">
          <button type="button" class="btn good" id="good">Помню</button>
          <button type="button" class="btn bad" id="bad">Повторить</button>
        </div>
      </section>
      <p class="empty hidden" id="empty">Карточек нет. Проверь фильтр или добавь заголовки ## / ### в заметки.</p>
    </main>

    <footer class="footer">
      <span id="counter"></span>
    </footer>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
  <script src="app.js?v=2"></script>
</body>
</html>
